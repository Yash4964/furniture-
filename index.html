<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FurniSpace</title>

<style>
    
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #f4f6f9;
    color: #1f2937;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding: 16px 30px;
    background: #ffffff;
    box-shadow: 0 6px 24px rgba(15, 23, 42, 0.08);
    position: sticky;
    top: 0;
    z-index: 100;
}

.brand {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-badge {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, #0f172a, #2563eb);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
}

.brand-text h2 {
    margin: 0;
    font-size: 22px;
    line-height: 1.1;
}

.brand-text p {
    margin: 2px 0 0;
    font-size: 12px;
    color: #64748b;
}

.nav-links {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.header a,
.header button {
    margin: 0;
    cursor: pointer;
    text-decoration: none;
    color: #334155;
    font-weight: 600;
    border: 0;
    background: #eef2ff;
    padding: 10px 16px;
    border-radius: 999px;
    transition: 0.2s ease;
}

.header a:hover,
.header button:hover {
    background: #dbeafe;
    color: #0f172a;
}

/* TITLE */
#title {
    padding: 24px 20px 8px;
    margin: 0;
    font-size: 26px;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.15);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* INFO */
.card-info {
    padding: 12px;
    text-align: center;
}

/* TITLE TEXT */
.title {
    font-size: 14px;
    font-weight: 600;
    color: #333;
    letter-spacing: 1px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    background: rgba(0,0,0,0.9);
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 9999;
}

.modal img {
    display: block;
    margin: 70px auto 20px;
    max-width: 90%;
    max-height: 78%;
    border-radius: 12px;
}

.close {
    position: absolute;
    top: 16px;
    right: 16px;
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15, 23, 42, 0.8);
    border-radius: 50%;
    z-index: 10000;
    line-height: 1;
}

.menu-toggle {
    display: none;
}

@media (max-width: 768px) {
    .header {
        padding: 14px 16px;
        align-items: flex-start;
        flex-wrap: wrap;
        position: relative;
    }

    .brand {
        width: 100%;
        padding-right: 60px;
    }

    .brand-text h2 {
        font-size: 18px;
    }

    .brand-text p {
        font-size: 11px;
    }

    .menu-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        position: absolute;
        top: 16px;
        right: 16px;
        border-radius: 10px;
        background: #0f172a;
        color: #fff;
        font-size: 16px;
        padding: 0;
    }

    .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        align-items: stretch;
        padding-top: 10px;
    }

    .nav-links.active {
        display: flex;
    }

    .nav-links a {
        width: 100%;
        text-align: center;
        padding: 12px 16px;
    }

    .menu-toggle {
        width: 34px;
        min-width: 34px;
        max-width: 34px;
        flex: 0 0 34px;
    }

    #title {
        padding: 20px 16px 4px;
        font-size: 22px;
    }

    .container {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        padding: 16px;
    }

    .card img {
        height: 150px;
    }

    .modal img {
        margin: 76px auto 16px;
        max-width: calc(100% - 24px);
        max-height: 72%;
    }

    .close {
        top: 14px;
        right: 14px;
    }
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="brand">
        <div class="logo-badge">F</div>
        <div class="brand-text">
            <h2>FurniSpace</h2>
            <p>Modern furniture collection</p>
        </div>
    </div>

    <button class="menu-toggle" id="menuToggle" type="button">☰</button>

    <nav class="nav-links" id="navLinks">
        <a onclick="loadTV()">TV Unit</a>
        <a onclick="loadBedroom()">Bedroom</a>
        <a onclick="loadMandir()">Mandir</a>
        <a onclick="loadKitchen()">Kitchen</a>
        <a onclick="loadWardrobe()">Wardrobe</a>
    </nav>
</header>

<h3 id="title">TV Unit Collection</h3>

<div id="products" class="container"></div>

<!-- MODAL -->
<div id="imageModal" class="modal">
    <span class="close" id="closeModal">&times;</span>
    <img id="modalImg">
</div>

<script>

// ================= API =================
const API = {
    tv: "https://69dce09c84f912a26404571d.mockapi.io/Tv_Unit",
    bedroom: "https://69dce09c84f912a26404571d.mockapi.io/badroom",
    mandir: "https://69de3161410caa3d47babfdb.mockapi.io/mandir",
    kitchen: "https://69de3161410caa3d47babfdb.mockapi.io/kitchen",
    wardrobe: "https://69de37f1410caa3d47bacf18.mockapi.io/wardrobe"
};

const DEFAULT_IMG = "https://via.placeholder.com/300x200?text=No+Image";

const container = document.getElementById("products");
const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("modalImg");
const closeModal = document.getElementById("closeModal");
const title = document.getElementById("title");
const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

// ================= LOAD DATA =================
function loadData(type) {
    container.innerHTML = "Loading...";

    fetch(API[type])
    .then(res => res.json())
    .then(data => {
        let html = "";

        data.forEach(item => {
            let img = (type === "tv")
                ? item.tv_img
                : (type === "bedroom"
                    ? item.bad_img
                    : (type === "mandir"
                        ? item.mandir_img
                        : (type === "kitchen" ? item.kitchen_img : item.wardrobe_img)));

            img = img || item.image || item.img || item.photo || DEFAULT_IMG;

            img = img || DEFAULT_IMG;

            html += `
                <div class="card">
                    <img src="${img}" data-img="${img}">
                    <div class="card-info">
                        <p class="title">IMAGE_${item.id}</p>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;

        // CLICK IMAGE → FULL SCREEN
        document.querySelectorAll(".card img").forEach(img => {
            img.onclick = () => {
                modal.style.display = "block";
                modalImg.src = img.dataset.img;
            };
        });
    })
    .catch(() => {
        container.innerHTML = "Failed to load data";
    });
}

// ================= NAV =================
function loadTV() {
    title.innerText = "TV Unit Collection";
    loadData("tv");
}

function loadBedroom() {
    title.innerText = "Bedroom Collection";
    loadData("bedroom");
}

function loadMandir() {
    title.innerText = "Mandir Collection";
    loadData("mandir");
}

function loadKitchen() {
    title.innerText = "Kitchen Collection";
    loadData("kitchen");
}

function loadWardrobe() {
    title.innerText = "Wardrobe Collection";
    loadData("wardrobe");
}

// ================= MODAL CLOSE =================
closeModal.onclick = () => modal.style.display = "none";

window.onclick = (e) => {
    if (e.target === modal) modal.style.display = "none";
};

// ================= MOBILE MENU =================
menuToggle.onclick = () => {
    navLinks.classList.toggle("active");
};

// ================= DEFAULT LOAD =================
loadTV();

</script>

</body>
</html>
